{% extends "base.html" %}
{% load static %}

{% block title %}Tabla Periódica | EduLink{% endblock %}

{% block content %}
<div class="container-fluid py-4">
    <div class="row mb-4">
        <div class="col">
            <h1 class="h2 fw-bold text-primary">
                🧪 Tabla Periódica Interactiva
            </h1>
            <p class="text-muted">
                Explora los elementos químicos con datos en tiempo real desde la API
            </p>
        </div>
    </div>

    <!-- Controles -->
    <div class="row mb-4">
        <!-- Buscador -->
        <div class="col-md-6">
            <div class="card">
                <div class="card-body">
                    <div class="input-group">
                        <input type="text" class="form-control" id="filtro-elemento" 
                               placeholder="Buscar elemento...">
                        <button class="btn btn-outline-primary" onclick="buscarElemento()">
                            <i class="fas fa-search"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Modo avanzado -->
        <div class="col-md-6">
            <div class="card">
                <div class="card-body">
                    <div class="form-check form-switch">
                        <input class="form-check-input" type="checkbox" id="modo-avanzado" 
                               onchange="toggleModoAvanzado()">
                        <label class="form-check-label" for="modo-avanzado">
                            Mostrar datos avanzados
                        </label>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Tabla periódica -->
    <div class="row">
        <div class="col">
            <div class="card">
                <div class="card-body">
                    <div id="tabla-container">
                        <!-- La tabla se genera por JavaScript -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Detalles -->
    <div class="modal fade" id="modalElemento" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="elementoNombre"></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="elementoDetalles">
                    <!-- Detalles por JavaScript -->
                </div>
            </div>
        </div>
    </div>
</div>

<script>

// Datos seguros desde Django
let elementos = {{ elementos_json|safe }};
let modoAvanzado = false;


// =============================
// Generar tabla
// =============================
function generarTabla() {

    const container = document.getElementById('tabla-container');
    
    if (!elementos || elementos.length === 0) {
        container.innerHTML = '<p class="text-danger">Error al cargar los elementos</p>';
        return;
    }
    
    let html = `
    <div class="table-responsive">
        <table class="table table-bordered table-hover">
            <thead>
                <tr>
                    <th>Símbolo</th>
                    <th>Nombre</th>
                    <th>Número</th>
                    <th>Masa</th>
                    <th>Grupo</th>
                    ${modoAvanzado ? `
                        <th>Categoría</th>
                        <th>Electronegatividad</th>
                        <th>Estado</th>
                    ` : ""}
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
    `;
    
    elementos.forEach(elemento => {

        html += `
        <tr>
            <td><strong>${elemento.simbolo}</strong></td>
            <td>${elemento.nombre}</td>
            <td>${elemento.numero}</td>
            <td>${elemento.masa}</td>
            <td>${elemento.grupo}</td>

            ${modoAvanzado ? `
                <td>${elemento.categoria || ''}</td>
                <td>${elemento.electronegatividad || ''}</td>
                <td>${elemento.estado || ''}</td>
            ` : ""}

            <td>
                <button class="btn btn-sm btn-info" onclick="mostrarDetalles('${elemento.simbolo}')">
                    <i class="fas fa-info-circle"></i>
                </button>
            </td>
        </tr>`;
    });

    html += `
            </tbody>
        </table>
    </div>`;

    container.innerHTML = html;
}



// =============================
// Modal de detalles
// =============================
function mostrarDetalles(simbolo) {

    const elemento = elementos.find(e => e.simbolo === simbolo);

    if (!elemento) return;

    document.getElementById('elementoNombre').textContent =
        `${elemento.nombre} (${elemento.simbolo})`;

    let detalles = `
        <div class="row">
            <div class="col-md-6">
                <p><strong>Número atómico:</strong> ${elemento.numero}</p>
                <p><strong>Masa atómica:</strong> ${elemento.masa} u</p>
                <p><strong>Grupo:</strong> ${elemento.grupo}</p>
                <p><strong>Periodo:</strong> ${elemento.periodo || 'N/A'}</p>
            </div>
            <div class="col-md-6">
                <p><strong>Categoría:</strong> ${elemento.categoria || 'N/A'}</p>
                <p><strong>Configuración electrónica:</strong> ${elemento.config_electronica || 'N/A'}</p>
                <p><strong>Electronegatividad:</strong> ${elemento.electronegatividad || 'N/A'}</p>
                <p><strong>Estado:</strong> ${elemento.estado || 'N/A'}</p>
            </div>
        </div>
    `;

    if (elemento.densidad)
        detalles += `<p><strong>Densidad:</strong> ${elemento.densidad} g/cm³</p>`;

    if (elemento.punto_fusion)
        detalles += `<p><strong>Punto de fusión:</strong> ${elemento.punto_fusion} K</p>`;

    if (elemento.punto_ebullicion)
        detalles += `<p><strong>Punto de ebullición:</strong> ${elemento.punto_ebullicion} K</p>`;

    document.getElementById('elementoDetalles').innerHTML = detalles;

    new bootstrap.Modal(document.getElementById('modalElemento')).show();
}



// =============================
// Filtro de búsqueda
// =============================
function buscarElemento() {

    const filtro = document.getElementById('filtro-elemento').value.toLowerCase();

    const filas = document.querySelectorAll('#tabla-container tbody tr');

    filas.forEach(fila => {

        const texto = fila.textContent.toLowerCase();

        fila.style.display = texto.includes(filtro) ? '' : 'none';

    });
}



// =============================
// Modo avanzado
// =============================
function toggleModoAvanzado() {

    modoAvanzado = document.getElementById('modo-avanzado').checked;

    generarTabla();

}



// =============================
// Inicialización
// =============================
document.addEventListener('DOMContentLoaded', function() {

    generarTabla();

});



// =============================
// Intentar actualizar desde API
// =============================
fetch("{% url 'tabla_periodica' %}", {
    headers: {
        'X-Requested-With': 'XMLHttpRequest'
    },
    credentials: 'same-origin'
})
.then(response => {

    if (!response.ok) {
        throw new Error(`HTTP error! status: ${response.status}`);
    }

    return response.json();

})
.then(data => {

    if (data.success && data.elementos) {

        elementos = data.elementos;

        generarTabla();

    } else {

        console.warn('La API devolvió datos no válidos, usando locales');

    }

})
.catch(error => {

    console.error("Error al actualizar desde API:", error);

    // No pasa nada porque ya tenemos los datos de Django

});

</script>
{% endblock %}
