{% extends 'admin/base_admin.html' %}
{% load static %}

{% block admin_content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="h2">✏️ Editar Promoción</h2>
    <a href="{% url 'gestion_promociones' %}" class="btn btn-outline-secondary">
        <i class="fas fa-arrow-left me-2"></i>Volver a promociones
    </a>
</div>

<div class="card border-0 shadow-sm">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary">
                <i class="fas fa-save me-2"></i>Guardar cambios
            </button>
            <a href="{% url 'gestion_promociones' %}" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
