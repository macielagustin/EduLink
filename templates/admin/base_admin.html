{% extends "base.html" %}
{% load static %}

{% block title %}Admin - EduLink{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="row">
        <!-- Sidebar fijo con altura completa -->
        <div class="col-md-3 col-lg-2 bg-dark text-white vh-100 position-fixed" style="z-index: 1000; overflow-y: auto;">
            <div class="p-3">
                <h4 class="text-warning fw-bold">
                    <i class="fas fa-crown me-2"></i>Admin Panel
                </h4>
                <hr class="bg-light">
                
                <ul class="nav nav-pills flex-column">
                    <li class="nav-item">
                        <a href="{% url 'dashboard_admin' %}" 
                           class="nav-link text-white {% if request.resolver_match.url_name == 'dashboard_admin' %}active{% endif %}">
                            <i class="fas fa-tachometer-alt me-2"></i>Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="{% url 'estadisticas_detalladas' %}" 
                           class="nav-link text-white {% if request.resolver_match.url_name == 'estadisticas_detalladas' %}active{% endif %}">
                            <i class="fas fa-chart-bar me-2"></i>Estadísticas
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="{% url 'gestion_promociones' %}" 
                           class="nav-link text-white {% if request.resolver_match.url_name == 'gestion_promociones' %}active{% endif %}">
                            <i class="fas fa-tag me-2"></i>Promociones
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="{% url 'gestion_vouchers' %}" 
                           class="nav-link text-white {% if request.resolver_match.url_name == 'gestion_vouchers' %}active{% endif %}">
                            <i class="fas fa-ticket-alt me-2"></i>Vouchers
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="{% url 'lista_usuarios_admin' %}" 
                           class="nav-link text-white {% if request.resolver_match.url_name == 'lista_usuarios_admin' %}active{% endif %}">
                            <i class="fas fa-users me-2"></i>Usuarios
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="/django-admin/" class="nav-link text-warning">
                            <i class="fas fa-cog me-2"></i>Django Admin
                        </a>
                    </li>
                </ul>
            </div>
        </div>

        <!-- Main content con margen izquierdo igual al ancho del sidebar -->
        <div class="col-md-9 col-lg-10" style="margin-left: 16.66666667%;">
            <div class="p-4">
                {% block admin_content %}
                {% endblock %}
            </div>
        </div>
    </div>
</div>
{% endblock %}
